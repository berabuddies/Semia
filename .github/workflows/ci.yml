name: CI

# Per-PR / per-push validation. The matrix covers our two supported Python
# versions on Linux plus a single 3.12 job each on macOS and Windows so we
# catch platform-specific bugs (path separators, encoding, line endings)
# before they reach users. All actions are pinned to a full commit SHA;
# Dependabot keeps both the SHA and the trailing `# <tag>` comment fresh.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.os }} · Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux is our reference platform: full matrix + coverage upload.
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
            primary: true
          # macOS and Windows: 3.12 only — smoke tests against the latest
          # supported runtime catch platform regressions without spending CI
          # minutes on the full version matrix.
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    # Use bash on every OS (Git Bash on Windows runners) so every step has
    # uniform glob expansion and `for ... do` semantics.
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dev dependencies
        # Reads `[dependency-groups].dev` from pyproject.toml — keeps the CI
        # toolchain (pre-commit, coverage, build, twine, mypy) in lockstep
        # with what `uv sync` gives a contributor locally.
        run: uv pip install --system --group dev

      - name: Run checks
        run: make check

      - name: Rebuild plugin zipapps and verify they match what is committed
        # `build_zipapp.py` is byte-reproducible by design, so any drift here
        # means a contributor forgot to re-run `make bundle-plugins` after
        # changing packages/semia-{cli,core}/src. Reproducibility across
        # macOS and Windows relies on the LF normalization rules in
        # `.gitattributes`; without it Windows would emit CRLF source files.
        run: |
          make bundle-plugins
          git diff --exit-code -- 'packages/semia-plugins/*/bin/*.pyz'

      - name: Reassemble per-host SKILL.md files and verify they match what is committed
        # The shared workflow body lives in
        # packages/semia-plugins/shared/skills/semia/SKILL.md; each
        # host's _host.md overlay supplies the host-specific intro. Drift here
        # means a contributor forgot to re-run `make assemble-plugin-skills`.
        run: |
          make assemble-plugin-skills
          git diff --exit-code -- 'packages/semia-plugins/*/skills/*/SKILL.md'

      - name: Build package
        run: make build

      - name: Install built wheel and smoke test the CLI entry point
        # `twine check` validates metadata only; this step actually installs
        # the wheel and invokes the `semia` console_script. A broken entry
        # point, missing package data, or a platform-specific import error
        # surfaces here instead of after publishing to PyPI.
        run: make smoke-installed

      - name: Smoke test plugin zipapps
        # The drift check above only verifies the bytes are reproducible — it
        # does not prove the zipapp is runnable. Invoke each bundled .pyz so
        # a broken bundle (missing module, wrong entry point) fails CI.
        run: make smoke-zipapps

      - name: Upload built distributions
        if: matrix.primary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-distributions
          path: |
            dist/*.tar.gz
            dist/*.whl
            dist/build-check.json
          if-no-files-found: error
          retention-days: 7

      - name: Run coverage
        if: matrix.primary
        run: make coverage

      - name: Upload coverage to Codecov
        if: matrix.primary
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          # Codecov rejects tokenless uploads against protected branches
          # ("Token required because branch is protected"). Set the
          # `CODECOV_TOKEN` repo secret from
          # https://app.codecov.io/gh/berabuddies/Semia/settings
          # for the badge to populate.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  types:
    # Separate job for the type checker. Currently `continue-on-error: true`
    # on the mypy step so existing untyped code lands as a baseline — flip to
    # false once `make types` is clean and decide on `disallow_untyped_defs`.
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dev dependencies
        run: uv pip install --system --group dev

      - name: Run mypy
        continue-on-error: true
        run: make types
